<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Insights - Fuel Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #2c5530 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 20px;
        }

        .insights-container {
            display: flex;
            height: calc(100vh - 40px);
            gap: 30px;
            position: relative;
        }

        .component-card-container {
            flex: 0 0 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .component-card {
            width: 350px;
            height: 450px;
            background: rgba(52, 73, 94, 0.9);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            animation: slideInFromRight 1s ease-out;
        }

        .properties-panel {
            flex: 1;
            background: rgba(44, 62, 80, 0.95);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: slideInFromLeft 1s ease-out;
            overflow-y: auto;
        }

        @keyframes slideInFromRight {
            0% {
                transform: translateX(100%) scale(0.8);
                opacity: 0;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        @keyframes slideInFromLeft {
            0% {
                transform: translateX(-100%) scale(0.8);
                opacity: 0;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        .component-icon {
            font-size: 4rem;
            color: #1abc9c;
            margin-bottom: 1.5rem;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .component-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #ecf0f1;
        }

        .component-value {
            font-size: 3rem;
            font-weight: 700;
            color: #1abc9c;
            margin: 1rem 0;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-family: 'Courier New', monospace;
        }

        .properties-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #1abc9c;
            text-align: center;
            border-bottom: 2px solid rgba(26, 188, 156, 0.3);
            padding-bottom: 1rem;
        }

        .property-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #1abc9c;
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .property-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
        }

        .property-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ecf0f1;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .property-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1abc9c;
            font-family: 'Courier New', monospace;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: linear-gradient(135deg, #2980b9, #1f618d);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #1abc9c;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <button class="back-btn" onclick="goBack()">
        <i class="fas fa-arrow-left"></i>
        Back to Composition
    </button>

    <div class="insights-container">
        <!-- Component Card (Right Side) -->
        <div class="component-card-container">
            <div class="component-card">
                <div class="component-icon">
                    <i id="componentIcon" class="fas fa-vial"></i>
                </div>

                <h2 class="component-title" id="componentTitle">Component A</h2>

                <div class="component-value" id="componentValue">0.20</div>

                <div style="color: rgba(255,255,255,0.7); font-size: 1rem;">
                    Current Composition
                </div>

                <div style="margin-top: 2rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 10px;">
                    <div style="font-size: 0.9rem; color: rgba(255,255,255,0.8);">
                        <i class="fas fa-info-circle"></i>
                        <span id="componentStatus">Moderate concentration</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Properties Panel (Left Side) -->
        <div class="properties-panel">
            <h2 class="properties-title">
                <i class="fas fa-chart-bar"></i>
                Component Properties Analysis
            </h2>
            <div id="propertiesList">
                <!-- Properties will be dynamically loaded here -->
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const component = urlParams.get('component') || '1';
        const value = parseFloat(urlParams.get('value')) || 0.2;

        const componentIcons = {
            '1': 'fas fa-oil-can',
            '2': 'fas fa-flask',
            '3': 'fas fa-atom',
            '4': 'fas fa-fire',
            '5': 'fas fa-leaf'
        };

        function initializePage() {
            document.getElementById('componentIcon').className = componentIcons[component] || 'fas fa-vial';
            document.getElementById('componentTitle').textContent = `Component ${component}`;
            document.getElementById('componentValue').textContent = value.toFixed(2);

            const statusElement = document.getElementById('componentStatus');
            if (value < 0.1) statusElement.textContent = 'Low concentration';
            else if (value < 0.3) statusElement.textContent = 'Moderate concentration';
            else if (value < 0.6) statusElement.textContent = 'High concentration';
            else statusElement.textContent = 'Very high concentration';
            
            loadProperties();
        }

        async function loadProperties() {
            const propertiesList = document.getElementById('propertiesList');
            propertiesList.innerHTML = '<div class="text-center"><div class="loading-spinner"></div><p>Loading properties...</p></div>';

            try {
                // Call the backend API
                const response = await fetch('http://127.0.0.1:5000/get-component-properties', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ component: component })
                });

                if (!response.ok) throw new Error('API response was not ok.');
                
                const data = await response.json();
                propertiesList.innerHTML = ''; // Clear loading spinner

                // Create and display a property item for each property from the API
                Object.keys(data).forEach((key, index) => {
                    const propertyItem = document.createElement('div');
                    propertyItem.className = 'property-item';
                    propertyItem.style.animationDelay = `${index * 0.1}s`;
                    propertyItem.innerHTML = `
                        <div class="property-name">
                            <i class="fas fa-cog"></i> ${key}
                        </div>
                        <div class="property-value">${parseFloat(data[key]).toFixed(4)}</div>
                    `;
                    propertiesList.appendChild(propertyItem);
                });

            } catch (error) {
                console.error('Error fetching component properties:', error);
                propertiesList.innerHTML = `<div class="alert alert-danger">Failed to load properties. Please ensure the backend server is running.</div>`;
            }
        }

        function goBack() {
            window.history.back();
        }

        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>

</html>
